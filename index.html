<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#4f46e5">
<title>AI Prompt Manager</title>
<style>
  html[data-theme="dark"]{
    --bg:#0f1220; --bg2:#171b2e; --card:#1e2238; --card2:#262b45;
    --line:#2e3454; --text:#eef0f8; --muted:#9aa1c4; --accent:#6366f1;
    --accent2:#8b5cf6; --fav:#f5b945; --ok:#34d399; --danger:#f87171;
    --grad:linear-gradient(180deg,#0f1220 0%,#12152a 100%); --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  html[data-theme="light"]{
    --bg:#eef1f8; --bg2:#ffffff; --card:#ffffff; --card2:#f1f3fb;
    --line:#dfe3f0; --text:#1c2138; --muted:#6b7290; --accent:#5b5bf0;
    --accent2:#8b5cf6; --fav:#e6a417; --ok:#10a37f; --danger:#e5484d;
    --grad:linear-gradient(180deg,#eef1f8 0%,#e7ebf6 100%); --shadow:0 10px 28px rgba(40,50,90,.12);
  }
  :root{--radius:16px}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;background:var(--grad);color:var(--text);min-height:100vh;line-height:1.45;padding-bottom:env(safe-area-inset-bottom);transition:background .25s,color .25s}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit;font-size:16px}

  header{position:sticky;top:0;z-index:30;background:var(--bg2);border-bottom:1px solid var(--line);padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top))}
  html[data-theme="dark"] header{background:rgba(15,18,32,.82);backdrop-filter:blur(14px)}
  html[data-theme="light"] header{background:rgba(255,255,255,.88);backdrop-filter:blur(14px)}
  .head-row{display:flex;align-items:center;gap:8px;max-width:1200px;margin:0 auto}
  .logo{font-size:20px;font-weight:800;display:flex;align-items:center;gap:8px;white-space:nowrap}
  .logo .dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 14px var(--accent)}
  .spacer{flex:1}
  .icon-btn{width:42px;height:42px;border-radius:12px;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;font-size:18px;transition:.15s;flex:none}
  .icon-btn:hover{background:var(--card2);transform:translateY(-1px)}
  .icon-btn.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-radius:12px;padding:0 16px;height:42px;font-weight:700;font-size:14px;display:inline-flex;align-items:center;gap:7px;box-shadow:0 6px 18px rgba(99,102,241,.4);transition:.15s}
  .btn-primary:hover{transform:translateY(-1px)}
  .search-wrap{max-width:1200px;margin:12px auto 0;position:relative}
  .search-wrap input{width:100%;height:46px;border-radius:14px;border:1px solid var(--line);background:var(--card);color:var(--text);padding:0 44px;outline:none;transition:.15s}
  .search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.18)}
  .search-wrap .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:8px;color:var(--muted);font-size:18px;display:none}
  .search-clear.show{display:grid;place-items:center}

  .tabs{display:flex;gap:8px;overflow-x:auto;padding:14px 16px 2px;max-width:1200px;margin:0 auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .chip{flex:none;padding:8px 14px;border-radius:999px;background:var(--card);border:1px solid var(--line);color:var(--muted);font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:.15s;white-space:nowrap}
  .chip .cnt{background:var(--bg);border-radius:999px;padding:1px 7px;font-size:11px;color:var(--muted)}
  .chip.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
  .chip.active .cnt{background:rgba(255,255,255,.25);color:#fff}
  .chip:hover{transform:translateY(-1px)}

  main{max-width:1200px;margin:0 auto;padding:14px 16px 60px}
  .grid{display:grid;gap:14px;grid-template-columns:1fr}
  @media(min-width:680px){.grid:not(.list){grid-template-columns:1fr 1fr}}
  @media(min-width:1040px){.grid:not(.list){grid-template-columns:1fr 1fr 1fr}}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:13px;display:flex;flex-direction:column;gap:10px;position:relative;box-shadow:var(--shadow);transition:border-color .15s,box-shadow .15s}
  .card:hover{border-color:var(--accent)}
  .card.drag-source{opacity:.35}
  .card.drag-over{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.3)}
  .card-title{font-weight:700;font-size:15.5px;word-break:break-word}
  .meta{display:flex;align-items:center;gap:10px;margin-top:4px;flex-wrap:wrap}
  .folder-tag,.uses{font-size:11.5px;color:var(--muted);display:inline-flex;align-items:center;gap:5px}
  .uses{background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:2px 9px;font-weight:600}
  .prompt-text{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:11px 12px;font-size:13.5px;color:var(--text);white-space:pre-wrap;word-break:break-word;max-height:220px;overflow:auto;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  html[data-theme="light"] .prompt-text{color:#33384f}
  .prompt-text.hidden{display:none}

  /* Barre d'actions icônes */
  .actions{display:flex;align-items:center;gap:6px;margin-top:auto}
  .act{width:38px;height:38px;border-radius:10px;background:var(--card2);border:1px solid var(--line);color:var(--text);display:inline-flex;align-items:center;justify-content:center;font-size:16px;transition:.15s;flex:none}
  .act:hover{background:var(--line);transform:translateY(-1px)}
  .act.copy.done{background:rgba(52,211,153,.18);border-color:var(--ok);color:var(--ok)}
  .act.danger{color:var(--danger)}
  .act.danger:hover{background:rgba(229,72,77,.16);border-color:var(--danger)}
  .act.fav{color:#9aa1c4}
  .act.fav.on{color:var(--fav);border-color:var(--fav);text-shadow:0 0 12px rgba(245,185,69,.45)}
  .act.grip{cursor:grab;color:var(--muted);touch-action:none}
  .act.grip:active{cursor:grabbing}
  .act.save{background:rgba(52,211,153,.16);border-color:var(--ok);color:var(--ok)}
  .a-spacer{flex:1}

  .grid.list .card{flex-direction:row;flex-wrap:wrap;align-items:center;padding:11px 13px;gap:8px 12px}
  .grid.list .head{flex:1 1 220px}
  .grid.list .prompt-text{flex:1 1 100%;order:9}
  .grid.list .actions{order:7;margin-top:0;flex:0 0 auto}
  .grid.list .a-spacer{display:none}
  .grid.list .ie-text{flex:1 1 100%}

  /* Édition en ligne */
  .ie-title{width:100%;background:var(--bg);border:1px solid var(--accent);color:var(--text);border-radius:10px;padding:9px 11px;font-weight:700;outline:none}
  .ie-text{width:100%;background:var(--bg);border:1px solid var(--accent);color:var(--text);border-radius:12px;padding:11px 12px;font-size:13.5px;min-height:120px;resize:vertical;outline:none;font-family:ui-monospace,monospace}

  .menu-wrap{position:relative}
  .menu{position:absolute;bottom:calc(100% + 6px);left:0;min-width:190px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:6px;box-shadow:var(--shadow);z-index:20;display:none}
  .menu.open{display:block}
  .menu.up-right{left:auto;right:0}
  .menu-item{width:100%;text-align:left;padding:9px 11px;border-radius:8px;font-size:13.5px;display:flex;align-items:center;gap:9px;color:var(--text)}
  .menu-item:hover{background:var(--accent);color:#fff}
  .menu-item.sep{border-top:1px solid var(--line);margin-top:4px;padding-top:11px}
  .menu-label{padding:7px 11px 4px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}

  .empty{text-align:center;padding:70px 20px;color:var(--muted)}
  .empty .em{font-size:54px;margin-bottom:14px}
  .empty h3{color:var(--text);margin:0 0 6px;font-weight:700}
  .drag-ghost{position:fixed;z-index:100;pointer-events:none;opacity:.95;box-shadow:0 18px 40px rgba(0,0,0,.4);transform:scale(1.02);border-radius:var(--radius);overflow:hidden}

  .overlay{position:fixed;inset:0;background:rgba(6,8,18,.6);backdrop-filter:blur(4px);z-index:50;display:none;align-items:flex-end;justify-content:center}
  .overlay.open{display:flex}
  @media(min-width:680px){.overlay{align-items:center}}
  .modal{background:var(--bg2);border:1px solid var(--line);width:100%;max-width:560px;border-radius:20px 20px 0 0;padding:20px;box-shadow:var(--shadow);max-height:92vh;overflow:auto}
  @media(min-width:680px){.modal{border-radius:20px}}
  .modal h2{margin:0 0 16px;font-size:19px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:6px;font-weight:600}
  .field input,.field textarea,.field select{width:100%;background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:12px;padding:11px 12px;outline:none;transition:.15s}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.18)}
  .field textarea{min-height:130px;resize:vertical;font-family:ui-monospace,monospace;font-size:13.5px}
  .modal-actions{display:flex;gap:10px;margin-top:8px}
  .modal-actions .btn-primary{flex:1;justify-content:center;height:46px}
  .btn-ghost{flex:1;height:46px;border-radius:12px;background:var(--card);border:1px solid var(--line);font-weight:700;color:var(--text)}
  .btn-ghost:hover{background:var(--card2)}
  .hint{font-size:11.5px;color:var(--muted);margin-top:5px}
  .folder-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
  .folder-line{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 10px}
  .folder-line input{flex:1;background:transparent;border:none;color:var(--text);outline:none}
  .folder-line .del{color:var(--danger);font-size:17px;width:32px;height:32px;border-radius:8px}
  .add-folder{display:flex;gap:8px}
  .add-folder input{flex:1}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--line);color:var(--text);padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:var(--shadow);z-index:80;opacity:0;pointer-events:none;transition:.25s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media(max-width:679px){.btn-primary.add-top span{display:none}.btn-primary.add-top{padding:0;width:42px;justify-content:center}}
  select option{background:var(--bg2)}
</style>
</head>
<body>

<header>
  <div class="head-row">
    <div class="logo"><span class="dot"></span> AI Prompt Manager</div>
    <div class="spacer"></div>
    <button class="btn-primary add-top" onclick="openNew()">＋ <span data-i18n="newBtn">Nouveau</span></button>
    <button class="icon-btn" id="detailsBtn" onclick="toggleDetails()">👁️</button>
    <button class="icon-btn" id="viewBtn" onclick="toggleView()">☰</button>
    <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
    <button class="icon-btn" id="foldersBtn" data-i18n-title="foldersTitle" onclick="openFolders()">🗂️</button>
    <button class="icon-btn" id="settingsBtn" data-i18n-title="settingsTitle" onclick="openSettings()">⚙️</button>
  </div>
  <div class="search-wrap">
    <span class="si">🔍</span>
    <input id="search" type="search" data-i18n-ph="searchPh" autocomplete="off">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
</header>

<div class="tabs" id="tabs"></div>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">
    <div class="em">📭</div>
    <h3 data-i18n="emptyTitle">Aucun prompt</h3>
    <p id="emptyDesc"></p>
  </div>
</main>

<!-- Modale nouveau prompt -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <h2 data-i18n="newPrompt">Nouveau prompt</h2>
    <div class="field"><label data-i18n="titleLabel">Titre</label><input id="f_title" data-i18n-ph="titlePh"></div>
    <div class="field"><label data-i18n="promptLabel">Prompt</label><textarea id="f_text" data-i18n-ph="promptPh"></textarea></div>
    <div class="field"><label data-i18n="folderLabel">Dossier</label><select id="f_folder"></select></div>
    <div class="field" style="display:flex;align-items:center;gap:9px">
      <input type="checkbox" id="f_fav" style="width:18px;height:18px">
      <label for="f_fav" style="margin:0;cursor:pointer" data-i18n="favLabel">⭐ Ajouter aux favoris</label>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" data-i18n="cancel" onclick="closeModal('editOverlay')">Annuler</button>
      <button class="btn-primary" data-i18n="save" onclick="savePrompt()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Modale dossiers -->
<div class="overlay" id="foldersOverlay">
  <div class="modal">
    <h2 data-i18n="foldersH">Dossiers</h2>
    <div class="folder-list" id="folderList"></div>
    <div class="add-folder">
      <input id="newFolder" data-i18n-ph="newFolderPh">
      <button class="btn-primary" data-i18n="add" onclick="addFolder()">Ajouter</button>
    </div>
    <div class="modal-actions" style="margin-top:18px"><button class="btn-primary" data-i18n="done" onclick="closeModal('foldersOverlay')">Terminé</button></div>
  </div>
</div>

<!-- Modale paramètres -->
<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <h2 data-i18n="settingsH">Paramètres</h2>
    <div class="field"><label data-i18n="langLabel">Langue</label>
      <select id="s_lang"><option value="fr">Français</option><option value="en">English</option></select>
    </div>
    <hr style="border:none;border-top:1px solid var(--line);margin:18px 0">
    <p class="hint" id="openInHint" style="margin-bottom:16px"></p>
    <div class="field"><label>Microsoft Copilot</label><input id="s_copilot"></div>
    <div class="field"><label>Google Gemini</label><input id="s_gemini"></div>
    <div class="field"><label>ChatGPT</label><input id="s_chatgpt"></div>
    <div class="field"><label data-i18n="customNameLabel">Service personnalisé — nom</label><input id="s_customName"></div>
    <div class="field"><label data-i18n="customUrlLabel">Service personnalisé — URL</label><input id="s_customUrl" placeholder="https://…/?q={prompt}"></div>
    <hr style="border:none;border-top:1px solid var(--line);margin:18px 0">
    <div class="field">
      <label data-i18n="backupLabel">Sauvegarde des données</label>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn-ghost" data-i18n="export" onclick="exportData()">Exporter</button>
        <button class="btn-ghost" data-i18n="import" onclick="document.getElementById('importFile').click()">Importer</button>
        <button class="btn-ghost" data-i18n="resetCounters" onclick="resetUses()">Réinit. compteurs</button>
        <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)">
      </div>
      <p class="hint" id="backupHint"></p>
    </div>
    <div class="modal-actions" style="margin-top:8px">
      <button class="btn-ghost" data-i18n="cancel" onclick="closeModal('settingsOverlay')">Annuler</button>
      <button class="btn-primary" data-i18n="save" onclick="saveSettings()">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
/* ---------- i18n ---------- */
const I18N={
  fr:{newBtn:"Nouveau",searchPh:"Rechercher dans les titres et les prompts…",foldersTitle:"Dossiers",settingsTitle:"Paramètres",
    all:"Tous",fav:"Favoris",emptyTitle:"Aucun prompt",emptyDesc:"Ajoutez votre premier prompt avec le bouton « Nouveau ».",emptySearch:"Aucun résultat pour votre recherche.",
    tCopy:"Copier",tOpen:"Ouvrir dans",tView:"Afficher / masquer le prompt",tEdit:"Modifier le titre et le prompt",tMove:"Déplacer",tDelete:"Supprimer",tFav:"Favori",tDrag:"Glisser pour réorganiser",tUses:"Nombre d'utilisations",tSaveInline:"Enregistrer",tCancelInline:"Annuler",
    titlePh:"Ex. Résumé de réunion",promptPh:"Saisissez votre prompt…",
    detailsShow:"Afficher tous les prompts",detailsHide:"Masquer tous les prompts",viewToList:"Vue liste",viewToGrid:"Vue grille",themeLight:"Thème clair",themeDark:"Thème sombre",
    menuOpenIn:"Ouvrir dans",settingsItem:"Paramètres…",moveTo:"Déplacer vers",noFolder:"— Aucun dossier —",
    newPrompt:"Nouveau prompt",titleLabel:"Titre",promptLabel:"Prompt",folderLabel:"Dossier",favLabel:"⭐ Ajouter aux favoris",cancel:"Annuler",save:"Enregistrer",
    foldersH:"Dossiers",noFolders:"Aucun dossier pour l'instant.",newFolderPh:"Nom du nouveau dossier",add:"Ajouter",done:"Terminé",
    settingsH:"Paramètres",langLabel:"Langue",customNameLabel:"Service personnalisé — nom",customUrlLabel:"Service personnalisé — URL",backupLabel:"Sauvegarde des données",export:"Exporter",import:"Importer",resetCounters:"Réinit. compteurs",
    openInHint:"Lien d'ouverture de chaque service. Utilisez {prompt} pour insérer le texte dans l'URL (fonctionne avec ChatGPT). Gemini et Copilot n'acceptent pas le pré-remplissage par URL : le prompt est alors copié, il suffit de le coller (Ctrl/Cmd+V).",
    backupHint:"Vos données sont enregistrées sur cet appareil. Exportez un fichier pour les transférer vers un autre appareil.",
    copiedOpen:"Prompt copié — ouverture du service ✨",copiedConfig:"Prompt copié. Configurez l'URL dans ⚙️ Paramètres.",favOn:"Ajouté aux favoris ⭐",favOff:"Retiré des favoris",saved:"Enregistré ✓",deleted:"Supprimé",moved:"Déplacé",folderCreated:"Dossier créé",settingsSaved:"Paramètres enregistrés ✓",countersReset:"Compteurs réinitialisés",exported:"Sauvegarde exportée ⬇️",imported:"Données importées ✓",invalidFile:"Fichier invalide",unreadableFile:"Fichier illisible",needContent:"Ajoutez au moins un titre ou un prompt.",
    confirmDelete:"Supprimer le prompt « {t} » ?",confirmFolderDelete:"Supprimer ce dossier ? Les prompts qu'il contient ne seront pas supprimés.",confirmReset:"Remettre tous les compteurs d'utilisation à zéro ?",untitled:"(sans titre)"},
  en:{newBtn:"New",searchPh:"Search titles and prompts…",foldersTitle:"Folders",settingsTitle:"Settings",
    all:"All",fav:"Favorites",emptyTitle:"No prompts",emptyDesc:"Add your first prompt with the “New” button.",emptySearch:"No results for your search.",
    tCopy:"Copy",tOpen:"Open in",tView:"Show / hide prompt",tEdit:"Edit title and prompt",tMove:"Move",tDelete:"Delete",tFav:"Favorite",tDrag:"Drag to reorder",tUses:"Usage count",tSaveInline:"Save",tCancelInline:"Cancel",
    titlePh:"e.g. Meeting summary",promptPh:"Enter your prompt…",
    detailsShow:"Show all prompts",detailsHide:"Hide all prompts",viewToList:"List view",viewToGrid:"Grid view",themeLight:"Light theme",themeDark:"Dark theme",
    menuOpenIn:"Open in",settingsItem:"Settings…",moveTo:"Move to",noFolder:"— No folder —",
    newPrompt:"New prompt",titleLabel:"Title",promptLabel:"Prompt",folderLabel:"Folder",favLabel:"⭐ Add to favorites",cancel:"Cancel",save:"Save",
    foldersH:"Folders",noFolders:"No folders yet.",newFolderPh:"New folder name",add:"Add",done:"Done",
    settingsH:"Settings",langLabel:"Language",customNameLabel:"Custom service — name",customUrlLabel:"Custom service — URL",backupLabel:"Data backup",export:"Export",import:"Import",resetCounters:"Reset counters",
    openInHint:"Open link for each service. Use {prompt} to insert the text into the URL (works with ChatGPT). Gemini and Copilot don't support URL prefill: the prompt is copied instead, just paste it (Ctrl/Cmd+V).",
    backupHint:"Your data is stored on this device. Export a file to move it to another device.",
    copiedOpen:"Prompt copied — opening the service ✨",copiedConfig:"Prompt copied. Set the URL in ⚙️ Settings.",favOn:"Added to favorites ⭐",favOff:"Removed from favorites",saved:"Saved ✓",deleted:"Deleted",moved:"Moved",folderCreated:"Folder created",settingsSaved:"Settings saved ✓",countersReset:"Counters reset",exported:"Backup exported ⬇️",imported:"Data imported ✓",invalidFile:"Invalid file",unreadableFile:"Unreadable file",needContent:"Add at least a title or a prompt.",
    confirmDelete:"Delete the prompt “{t}”?",confirmFolderDelete:"Delete this folder? The prompts inside it won't be deleted.",confirmReset:"Reset all usage counters to zero?",untitled:"(untitled)"}
};
function t(k){ return (I18N[data.lang]||I18N.fr)[k] ?? k; }

/* ---------- État ---------- */
const KEY="mesPrompts.v1";
let data=load();
let filter="all", query="", inlineEditId=null;

function load(){
  try{ const raw=localStorage.getItem(KEY); if(raw) return migrate(JSON.parse(raw)); }catch(e){}
  return migrate({
    prompts:[
      {id:uid(),title:"Résumé de réunion",text:"Résume la transcription suivante en 5 points clés, les décisions prises et les actions à suivre (avec responsable) :\n\n",fav:true,folder:null,order:0},
      {id:uid(),title:"Email professionnel",text:"Rédige un email professionnel, clair et courtois à partir de ces notes :\n\n",fav:false,folder:null,order:1},
      {id:uid(),title:"Traduction FR → EN",text:"Traduis le texte suivant en anglais professionnel, en gardant le ton :\n\n",fav:false,folder:null,order:2}
    ],
    folders:[], settings:{}, theme:"dark", view:"grid", lang:"fr", showAllDetails:false
  });
}
function migrate(d){
  d.prompts=(d.prompts||[]).map(p=>({uses:0,...p}));
  d.folders=d.folders||[];
  d.settings=Object.assign({copilot:"https://copilot.microsoft.com/",gemini:"https://gemini.google.com/app",chatgpt:"https://chatgpt.com/?q={prompt}",customName:"",customUrl:""}, d.settings||{});
  d.theme=d.theme||"dark"; d.view=d.view||"grid"; d.lang=d.lang||"fr"; d.showAllDetails=!!d.showAllDetails;
  return d;
}
function save(){ localStorage.setItem(KEY,JSON.stringify(data)); }
function uid(){ return Math.random().toString(36).slice(2,10); }
function find(id){ return data.prompts.find(p=>p.id===id); }

/* ---------- Thème / vue / détails / langue ---------- */
function applyTheme(){ document.documentElement.dataset.theme=data.theme; const b=document.getElementById("themeBtn"); b.textContent=data.theme==="dark"?"☀️":"🌙"; b.title=t(data.theme==="dark"?"themeLight":"themeDark"); document.querySelector('meta[name=theme-color]').setAttribute("content",data.theme==="dark"?"#0f1220":"#eef1f8"); }
function toggleTheme(){ data.theme=data.theme==="dark"?"light":"dark"; save(); applyTheme(); }
function applyView(){ document.getElementById("grid").classList.toggle("list",data.view==="list"); const b=document.getElementById("viewBtn"); b.textContent=data.view==="list"?"▦":"☰"; b.title=t(data.view==="list"?"viewToGrid":"viewToList"); }
function toggleView(){ data.view=data.view==="list"?"grid":"list"; save(); applyView(); }
function applyDetails(){ const b=document.getElementById("detailsBtn"); b.classList.toggle("on",data.showAllDetails); b.textContent=data.showAllDetails?"🙈":"👁️"; b.title=t(data.showAllDetails?"detailsHide":"detailsShow"); }
function toggleDetails(){ data.showAllDetails=!data.showAllDetails; save(); applyDetails(); renderGrid(); }
function applyLang(){
  document.documentElement.lang=data.lang;
  document.querySelectorAll("[data-i18n]").forEach(e=>e.textContent=t(e.dataset.i18n));
  document.querySelectorAll("[data-i18n-ph]").forEach(e=>e.placeholder=t(e.dataset.i18nPh));
  document.querySelectorAll("[data-i18n-title]").forEach(e=>e.title=t(e.dataset.i18nTitle));
  document.getElementById("openInHint").textContent=t("openInHint");
  document.getElementById("backupHint").textContent=t("backupHint");
  applyTheme(); applyView(); applyDetails(); renderTabs(); renderGrid();
}

/* ---------- Rendu ---------- */
function folderName(id){ const f=data.folders.find(f=>f.id===id); return f?f.name:null; }
function renderTabs(){
  const all=data.prompts.length, fav=data.prompts.filter(p=>p.fav).length;
  let html=chip("all","🗂 "+t("all"),all)+chip("fav","⭐ "+t("fav"),fav);
  data.folders.forEach(f=>{ const c=data.prompts.filter(p=>p.folder===f.id).length; html+=chip("folder:"+f.id,"📁 "+escapeHtml(f.name),c); });
  document.getElementById("tabs").innerHTML=html;
}
function chip(val,label,count){ return `<button class="chip${filter===val?' active':''}" onclick="setFilter('${val}')">${label}<span class="cnt">${count}</span></button>`; }
function setFilter(v){ filter=v; renderTabs(); renderGrid(); }

function visibleList(){
  let list=data.prompts.slice();
  if(filter==="fav") list=list.filter(p=>p.fav);
  else if(filter.startsWith("folder:")){ const id=filter.split(":")[1]; list=list.filter(p=>p.folder===id); }
  if(query){ const q=query.toLowerCase(); list=list.filter(p=>(p.title||"").toLowerCase().includes(q)||(p.text||"").toLowerCase().includes(q)); }
  return list.sort((a,b)=>(a.order??0)-(b.order??0));
}
function renderGrid(){
  const grid=document.getElementById("grid"), empty=document.getElementById("empty");
  const list=visibleList();
  if(list.length===0){ grid.innerHTML=""; empty.style.display="block"; document.getElementById("emptyDesc").textContent=query?t("emptySearch"):t("emptyDesc"); return; }
  empty.style.display="none";
  grid.innerHTML=list.map(p=>p.id===inlineEditId?cardEditHtml(p):cardHtml(p)).join("");
  if(inlineEditId){ const ta=document.getElementById("ie-title-"+inlineEditId); if(ta) ta.focus(); }
}
function cardHtml(p){
  const fn=folderName(p.folder), s=data.settings, hidden=data.showAllDetails?"":" hidden";
  return `
  <div class="card" data-id="${p.id}">
    <div class="head">
      <div class="card-title">${escapeHtml(p.title||t("untitled"))}</div>
      <div class="meta">${fn?`<span class="folder-tag">📁 ${escapeHtml(fn)}</span>`:``}<span class="uses" title="${t('tUses')}">↻ ${p.uses||0}</span></div>
    </div>
    <div class="prompt-text${hidden}" id="pt-${p.id}">${escapeHtml(p.text||"")}</div>
    <div class="actions">
      <button class="act copy" title="${t('tCopy')}" onclick="copyPrompt('${p.id}',this)">📋</button>
      <div class="menu-wrap">
        <button class="act" title="${t('tOpen')}" onclick="toggleMenu(event,'${p.id}')">↗</button>
        <div class="menu" id="menu-${p.id}">
          <div class="menu-label">${t('menuOpenIn')}</div>
          <button class="menu-item" onclick="openIn('${p.id}','copilot')">🟦 Copilot</button>
          <button class="menu-item" onclick="openIn('${p.id}','gemini')">✨ Gemini</button>
          <button class="menu-item" onclick="openIn('${p.id}','chatgpt')">🟢 ChatGPT</button>
          ${s.customName&&s.customUrl?`<button class="menu-item" onclick="openIn('${p.id}','custom')">🔗 ${escapeHtml(s.customName)}</button>`:``}
          <button class="menu-item sep" onclick="openSettings()">⚙️ ${t('settingsItem')}</button>
        </div>
      </div>
      <button class="act" title="${t('tView')}" onclick="toggleReveal('${p.id}')" id="rev-${p.id}">👁</button>
      <button class="act" title="${t('tEdit')}" onclick="startInlineEdit('${p.id}')">✏️</button>
      <button class="act" title="${t('tMove')}" onclick="moveToFolder('${p.id}',event)">🗂</button>
      <button class="act danger" title="${t('tDelete')}" onclick="deletePrompt('${p.id}')">✕</button>
      <div class="a-spacer"></div>
      <button class="act fav ${p.fav?'on':''}" title="${t('tFav')}" onclick="toggleFav('${p.id}')">${p.fav?'★':'☆'}</button>
      <div class="act grip" title="${t('tDrag')}" data-grip>⠿</div>
    </div>
  </div>`;
}
function cardEditHtml(p){
  return `
  <div class="card" data-id="${p.id}">
    <input class="ie-title" id="ie-title-${p.id}" value="${escapeHtml(p.title||"")}" placeholder="${t('titlePh')}">
    <textarea class="ie-text" id="ie-text-${p.id}" placeholder="${t('promptPh')}">${escapeHtml(p.text||"")}</textarea>
    <div class="actions">
      <button class="act save" title="${t('tSaveInline')}" onclick="saveInline('${p.id}')">✓</button>
      <button class="act" title="${t('tCancelInline')}" onclick="cancelInline()">✕</button>
      <div class="a-spacer"></div>
    </div>
  </div>`;
}

/* ---------- Actions ---------- */
function toggleReveal(id){ const el=document.getElementById("pt-"+id), b=document.getElementById("rev-"+id); const h=el.classList.toggle("hidden"); if(b) b.textContent=h?"👁":"🙈"; }
function toggleFav(id){ const p=find(id); if(!p)return; p.fav=!p.fav; save(); renderTabs(); renderGrid(); toast(t(p.fav?"favOn":"favOff")); }
function bumpUses(id){ const p=find(id); if(p){ p.uses=(p.uses||0)+1; save(); const el=document.querySelector(`.card[data-id="${id}"] .uses`); if(el) el.textContent="↻ "+p.uses; } }
async function copyPrompt(id,btn){ const p=find(id); if(!p)return; await copyText(p.text||""); bumpUses(id); if(btn){ btn.classList.add("done"); btn.textContent="✓"; setTimeout(()=>{btn.classList.remove("done");btn.textContent="📋";},1300); } }
async function copyText(tx){ try{ await navigator.clipboard.writeText(tx); }catch(e){ const ta=document.createElement("textarea"); ta.value=tx; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");}catch(_){} ta.remove(); } }
function buildUrl(tpl,text){ if(!tpl)return null; return tpl.includes("{prompt}")?tpl.replace("{prompt}",encodeURIComponent(text)):tpl; }
function openIn(id,service){
  closeAllMenus(); const p=find(id); if(!p)return; const s=data.settings;
  const url=buildUrl({copilot:s.copilot,gemini:s.gemini,chatgpt:s.chatgpt,custom:s.customUrl}[service], p.text||"");
  copyText(p.text||"");           // pas d'await : préserve le geste utilisateur (sinon l'ouverture est bloquée)
  bumpUses(id);
  if(url) window.open(url,"_blank");
  toast(url?t("copiedOpen"):t("copiedConfig"));
}
function toggleMenu(e,id){ e.stopPropagation(); const m=document.getElementById("menu-"+id); const was=m.classList.contains("open"); closeAllMenus(); if(!was){ m.classList.add("open"); const r=m.getBoundingClientRect(); if(r.right>window.innerWidth-8) m.classList.add("up-right"); } }
function closeAllMenus(){ document.querySelectorAll(".menu.open").forEach(m=>m.classList.remove("open","up-right")); }
document.addEventListener("click",closeAllMenus);

function moveToFolder(id,e){
  e.stopPropagation(); closeAllMenus(); const p=find(id); if(!p)return;
  const opts=["__none__",...data.folders.map(f=>f.id)], labels=[t("noFolder"),...data.folders.map(f=>f.name)];
  const ex=document.getElementById("mvmenu"); if(ex)ex.remove();
  const menu=document.createElement("div"); menu.id="mvmenu"; menu.className="menu open"; menu.style.position="fixed";
  menu.innerHTML=`<div class="menu-label">${t("moveTo")}</div>`+opts.map((o,i)=>`<button class="menu-item" data-o="${o}">📁 ${escapeHtml(labels[i])}</button>`).join("");
  document.body.appendChild(menu);
  const r=e.target.getBoundingClientRect(); menu.style.left=Math.min(r.left,window.innerWidth-210)+"px"; menu.style.top=(r.bottom+6)+"px";
  menu.querySelectorAll(".menu-item").forEach(b=>b.onclick=ev=>{ev.stopPropagation();const o=b.dataset.o;p.folder=o==="__none__"?null:o;save();renderTabs();renderGrid();menu.remove();toast(t("moved"));});
  setTimeout(()=>document.addEventListener("click",function rm(){menu.remove();document.removeEventListener("click",rm);}),0);
}

/* ---------- Glisser-déposer (poignée uniquement) ---------- */
const drag={active:false,id:null,ghost:null,offX:0,offY:0,startX:0,startY:0,pending:false,sourceEl:null};
function noScroll(e){ if(drag.active) e.preventDefault(); }
document.getElementById("grid").addEventListener("pointerdown",e=>{
  const card=e.target.closest(".card"); if(!card)return;
  if(!e.target.closest("[data-grip]")) return;
  drag.id=card.dataset.id; drag.sourceEl=card; drag.startX=e.clientX; drag.startY=e.clientY; drag.pending=true;
},{passive:true});
document.addEventListener("pointermove",e=>{
  if(drag.pending && !drag.active){ if(Math.hypot(e.clientX-drag.startX,e.clientY-drag.startY)<=6) return; startDrag(drag.startX,drag.startY); }
  if(!drag.active) return;
  e.preventDefault();
  drag.ghost.style.left=(e.clientX-drag.offX)+"px"; drag.ghost.style.top=(e.clientY-drag.offY)+"px";
  const el=document.elementFromPoint(e.clientX,e.clientY);
  document.querySelectorAll(".card.drag-over").forEach(c=>c.classList.remove("drag-over"));
  const over=el&&el.closest(".card"); if(over&&over.dataset.id!==drag.id) over.classList.add("drag-over");
},{passive:false});
document.addEventListener("pointerup",e=>{
  drag.pending=false; if(!drag.active) return;
  const el=document.elementFromPoint(e.clientX,e.clientY), over=el&&el.closest(".card");
  if(over&&over.dataset.id!==drag.id){ const r=over.getBoundingClientRect(); reorderTo(drag.id,over.dataset.id,e.clientY>r.top+r.height/2); }
  endDrag();
});
function startDrag(x,y){
  drag.pending=false; const card=drag.sourceEl; if(!card)return; drag.active=true;
  const r=card.getBoundingClientRect(); drag.offX=x-r.left; drag.offY=y-r.top;
  const g=card.cloneNode(true); g.classList.add("drag-ghost"); g.style.width=r.width+"px"; g.style.left=r.left+"px"; g.style.top=r.top+"px";
  document.body.appendChild(g); drag.ghost=g; card.classList.add("drag-source"); document.body.style.userSelect="none";
  document.addEventListener("touchmove",noScroll,{passive:false}); if(navigator.vibrate) navigator.vibrate(12);
}
function endDrag(){
  drag.active=false; if(drag.ghost){ drag.ghost.remove(); drag.ghost=null; }
  if(drag.sourceEl) drag.sourceEl.classList.remove("drag-source");
  document.querySelectorAll(".card.drag-over").forEach(c=>c.classList.remove("drag-over"));
  document.body.style.userSelect=""; document.removeEventListener("touchmove",noScroll,{passive:false}); drag.id=null; drag.sourceEl=null;
}
function reorderTo(dragId,targetId,after){
  let list=data.prompts.slice().sort((a,b)=>(a.order??0)-(b.order??0));
  const from=list.findIndex(p=>p.id===dragId); const [m]=list.splice(from,1);
  let to=list.findIndex(p=>p.id===targetId); if(after) to+=1;
  list.splice(to,0,m); list.forEach((p,i)=>p.order=i); save(); renderGrid();
}

/* ---------- Édition en ligne ---------- */
function startInlineEdit(id){ inlineEditId=id; renderGrid(); }
function cancelInline(){ inlineEditId=null; renderGrid(); }
function saveInline(id){
  const p=find(id); if(!p)return;
  p.title=document.getElementById("ie-title-"+id).value.trim();
  p.text=document.getElementById("ie-text-"+id).value;
  inlineEditId=null; save(); renderTabs(); renderGrid(); toast(t("saved"));
}

/* ---------- Nouveau prompt (modale) ---------- */
function fillFolderSelect(sel,current){ sel.innerHTML=`<option value="">${t("noFolder")}</option>`+data.folders.map(f=>`<option value="${f.id}" ${current===f.id?'selected':''}>${escapeHtml(f.name)}</option>`).join(""); }
function openNew(){
  document.getElementById("f_title").value=""; document.getElementById("f_text").value=""; document.getElementById("f_fav").checked=false;
  fillFolderSelect(document.getElementById("f_folder"), filter.startsWith("folder:")?filter.split(":")[1]:"");
  openModal("editOverlay"); setTimeout(()=>document.getElementById("f_title").focus(),100);
}
function savePrompt(){
  const title=document.getElementById("f_title").value.trim(), text=document.getElementById("f_text").value;
  const fav=document.getElementById("f_fav").checked, folder=document.getElementById("f_folder").value||null;
  if(!title&&!text.trim()){ toast(t("needContent")); return; }
  const mo=data.prompts.reduce((m,p)=>Math.max(m,p.order??0),-1);
  data.prompts.push({id:uid(),title,text,fav,folder,uses:0,order:mo+1});
  save(); renderTabs(); renderGrid(); closeModal("editOverlay"); toast(t("saved"));
}
function deletePrompt(id){ const p=find(id); if(!p)return; if(!confirm(t("confirmDelete").replace("{t}",p.title||t("untitled"))))return; data.prompts=data.prompts.filter(x=>x.id!==id); save(); renderTabs(); renderGrid(); toast(t("deleted")); }

/* ---------- Dossiers ---------- */
function openFolders(){ renderFolderList(); openModal("foldersOverlay"); }
function renderFolderList(){
  const wrap=document.getElementById("folderList");
  if(data.folders.length===0){ wrap.innerHTML=`<p class="hint">${t("noFolders")}</p>`; return; }
  wrap.innerHTML=data.folders.map(f=>`<div class="folder-line"><span>📁</span><input value="${escapeHtml(f.name)}" onchange="renameFolder('${f.id}',this.value)"><button class="del" onclick="deleteFolder('${f.id}')">🗑️</button></div>`).join("");
}
function addFolder(){ const inp=document.getElementById("newFolder"); const name=inp.value.trim(); if(!name)return; data.folders.push({id:uid(),name}); inp.value=""; save(); renderFolderList(); renderTabs(); toast(t("folderCreated")); }
function renameFolder(id,name){ const f=data.folders.find(f=>f.id===id); if(f){f.name=name.trim()||f.name; save(); renderTabs();} }
function deleteFolder(id){ if(!confirm(t("confirmFolderDelete")))return; data.folders=data.folders.filter(f=>f.id!==id); data.prompts.forEach(p=>{if(p.folder===id)p.folder=null;}); if(filter==="folder:"+id)filter="all"; save(); renderFolderList(); renderTabs(); renderGrid(); }

/* ---------- Paramètres ---------- */
function openSettings(){ closeAllMenus(); const s=data.settings; document.getElementById("s_lang").value=data.lang; s_copilot.value=s.copilot||""; s_gemini.value=s.gemini||""; s_chatgpt.value=s.chatgpt||""; s_customName.value=s.customName||""; s_customUrl.value=s.customUrl||""; openModal("settingsOverlay"); }
function saveSettings(){
  data.lang=document.getElementById("s_lang").value;
  data.settings={copilot:s_copilot.value.trim(),gemini:s_gemini.value.trim(),chatgpt:s_chatgpt.value.trim(),customName:s_customName.value.trim(),customUrl:s_customUrl.value.trim()};
  save(); applyLang(); closeModal("settingsOverlay"); toast(t("settingsSaved"));
}
function resetUses(){ if(!confirm(t("confirmReset")))return; data.prompts.forEach(p=>p.uses=0); save(); renderGrid(); toast(t("countersReset")); }
function exportData(){ const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="ai-prompt-manager-sauvegarde.json"; a.click(); URL.revokeObjectURL(a.href); toast(t("exported")); }
function importData(ev){ const file=ev.target.files[0]; if(!file)return; const r=new FileReader(); r.onload=()=>{ try{ const d=JSON.parse(r.result); if(d.prompts){ data=migrate(Object.assign({folders:[],settings:data.settings,theme:data.theme,view:data.view,lang:data.lang,showAllDetails:data.showAllDetails},d)); save(); applyLang(); closeModal("settingsOverlay"); toast(t("imported")); } else toast(t("invalidFile")); }catch(e){ toast(t("unreadableFile")); } }; r.readAsText(file); ev.target.value=""; }

/* ---------- Modales / recherche / toast ---------- */
function openModal(id){ document.getElementById(id).classList.add("open"); document.body.style.overflow="hidden"; }
function closeModal(id){ document.getElementById(id).classList.remove("open"); document.body.style.overflow=""; }
document.querySelectorAll(".overlay").forEach(o=>o.addEventListener("click",e=>{ if(e.target===o) closeModal(o.id); }));
const searchEl=document.getElementById("search");
searchEl.addEventListener("input",()=>{ query=searchEl.value.trim(); document.getElementById("searchClear").classList.toggle("show",!!query); renderGrid(); });
function clearSearch(){ searchEl.value=""; query=""; document.getElementById("searchClear").classList.remove("show"); renderGrid(); searchEl.focus(); }
let toastTimer;
function toast(msg){ const el=document.getElementById("toast"); el.textContent=msg; el.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove("show"),1900); }
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ---------- Init ---------- */
applyLang();
</script>
